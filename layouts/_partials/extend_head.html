{{ if .IsPage }}
<script>
document.addEventListener('DOMContentLoaded', function () {
  var tocLinks = document.querySelectorAll('.papers-toc a, .toc-sidebar a');
  if (!tocLinks.length) return;

  var headings = Array.from(tocLinks).map(function (a) {
    var id = decodeURIComponent(a.getAttribute('href').slice(1));
    return document.getElementById(id);
  }).filter(Boolean);

  function onScroll() {
    var scrollY = window.scrollY + 80;
    var current = headings[0];
    for (var i = 0; i < headings.length; i++) {
      if (headings[i].offsetTop <= scrollY) current = headings[i];
    }
    tocLinks.forEach(function (a) { a.classList.remove('active'); });
    var activeLink = document.querySelector('.papers-toc a[href="#' + CSS.escape(current.id) + '"], .toc-sidebar a[href="#' + CSS.escape(current.id) + '"]');
    if (activeLink) activeLink.classList.add('active');
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
});
</script>
{{ end }}
