{{ if .IsPage }}
<style>
.like-pop{position:fixed;pointer-events:none;z-index:1000;width:50px;animation:likeFloat .8s ease-out forwards}
@keyframes likeFloat{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),-80px) scale(1.4)}}
</style>
<script>
function spawnPop(src,x,y){
  var pop=document.createElement('img');
  pop.src=src;
  pop.className='like-pop';
  pop.style.left=(x-25)+'px';
  pop.style.top=(y-25)+'px';
  document.body.appendChild(pop);
  setTimeout(function(){pop.remove()},800);
}
document.addEventListener('click',function(e){
  spawnPop('/images/like.jpg',e.clientX,e.clientY);
  var mirrorX=window.innerWidth-e.clientX;
  setTimeout(function(){spawnPop('/images/like2.jpg',mirrorX,e.clientY);},500);
});
</script>
