baseURL: "https://qshf.github.io/"
languageCode: zh-cn
title: "撒手 >_O "
theme: "PaperMod"
pagination:
  pagerSize: 10

params:
  author: qshf
  description: "论文笔记 & 生活随笔"
  defaultTheme: auto
  ShowToc: true
  TocOpen: false
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  math: true

  profileMode:
    enabled: true
    title: "O_O"
    subtitle: "聪明的墨菲特 · 分享论文阅读笔记与生活思考"
    buttons:
      - name: 论文笔记
        url: /papers/
      - name: 生活
        url: /life/

  socialIcons:
    - name: github
      url: "https://github.com/qshf"

menu:
  main:
    - name: 论文笔记
      url: /papers/
      weight: 1
    - name: 生活
      url: /life/
      weight: 2

taxonomies:
  tag: tags
  category: categories

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula
    noClasses: false
